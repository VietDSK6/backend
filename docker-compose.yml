version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: volunconnect-db
    environment:
      POSTGRES_USER: volunconnect
      POSTGRES_PASSWORD: volunconnect123
      POSTGRES_DB: volunconnect
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
